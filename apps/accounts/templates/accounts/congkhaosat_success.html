<!-- apps/accounts/templates/accounts/congkhaosat_success.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp phiếu thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F6F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #E2E8F0;
            padding: 3rem 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #ECFDF5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #10B981;
            font-size: 2.5rem;
        }
        .survey-code {
            background: #EFF6FF;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="success-card">
                    <div class="success-icon">
                        <i class="bi bi-check-lg"></i>
                    </div>
                    
                    <h2 class="fw-bold mb-2">Nộp phiếu thành công!</h2>
                    <p class="text-muted mb-4">Cảm ơn bạn đã tham gia khảo sát. Kết quả của bạn đã được ghi nhận.</p>
                    
                    <div class="survey-code mb-4">
                        <i class="bi bi-file-text text-primary-custom me-2"></i>
                        <span class="fw-semibold">Mã phiếu: <span class="text-primary-custom">#{{ response.id }}</span></span>
                    </div>
                    
                    <div class="text-muted small mb-4">
                        <i class="bi bi-clock me-1"></i>
                        Ngày nộp: {{ submitted_at|date:"d/m/Y H:i" }}
                    </div>
                    
                    <hr class="my-4">
                    
                    <a href="/" class="btn btn-primary btn-navigation px-4">
                        <i class="bi bi-house me-2"></i> Về trang chủ
                    </a>
                    <a href="{% url 'accounts:congkhaosat' %}" class="btn btn-outline-secondary btn-navigation px-4 ms-2">
                        <i class="bi bi-arrow-repeat me-2"></i> Làm khảo sát mới
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
