<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển khảo sát</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Skeleton loading shimmer */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
            border-radius: 6px;
        }
        
        /* Transitions & Animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .form-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        /* Hide scrollbar for filter pills on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & Tabs -->
                <div class="flex items-center gap-6">
                    <a href="{% url 'accounts:home' %}?choose_group=true" class="flex items-center gap-2.5 text-slate-600 hover:text-primary-600 transition" title="Quay lại chọn nhóm">
                        <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center text-white shadow-sm shadow-primary-500/20">
                            <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                        </div>
                        <span class="font-bold text-lg text-slate-900 hidden sm:block tracking-tight">Trang Chủ Khảo Sát</span>
                    </a>
                    
                    <nav class="hidden md:flex items-center bg-slate-100/50 p-1 rounded-lg">
                        <button id="forms-tab-btn" onclick="switchTab('forms')" class="px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition">
                            Biểu mẫu
                        </button>
                        <button id="overview-tab-btn" onclick="switchTab('overview')" class="px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition">
                            Tổng quan
                        </button>
                    </nav>
                </div>

                <!-- User Info -->
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end">
                        <div id="header-user-info" class="text-sm font-semibold text-slate-900 skeleton w-32 h-4"></div>
                        <div id="header-email" class="text-xs text-slate-500 skeleton w-24 h-3 mt-1.5"></div>
                    </div>
                    <a href="{{ logout_url }}" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition" title="Đăng xuất">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Đăng xuất</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Tab: Forms -->
        <div id="forms-pane" class="fade-in">
            <!-- Mobile Tabs -->
            <div class="md:hidden flex items-center bg-slate-100/50 p-1 rounded-lg mb-6 w-full">
                <button onclick="switchTab('forms')" id="mobile-forms-btn" class="flex-1 px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition">Biểu mẫu</button>
                <button onclick="switchTab('overview')" id="mobile-overview-btn" class="flex-1 px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 transition">Tổng quan</button>
            </div>

            <!-- Target Group Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <div class="flex items-center gap-2 text-xs font-semibold text-primary-600 uppercase tracking-wider mb-1">
                        <i data-lucide="users" class="w-3.5 h-3.5"></i>
                        Nhóm đối tượng
                    </div>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-3" id="targetGroupName">
                        <span class="skeleton w-48 h-7"></span>
                    </h1>
                    <div class="text-sm text-slate-500 mt-1" id="targetFormCount">
                        <span class="skeleton w-24 h-4"></span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="fetchDashboardData()" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition shadow-sm">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Làm mới</span>
                    </button>
                </div>
            </div>

            <!-- Note Card -->
            <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-8 flex gap-3 shadow-sm">
                <div class="text-blue-600 shrink-0 mt-0.5">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                </div>
                <div>
                    <h3 class="text-blue-800 font-bold text-sm mb-1.5">Lưu ý</h3>
                    <ul class="text-sm text-blue-700 list-disc list-inside space-y-1">
                        <li>Trạng thái biểu mẫu được lưu tự động. Bạn có thể làm tiếp các khảo sát đang dang dở miễn là chưa đóng trình duyệt.</li>
                        <li>Để kết thúc hoàn toàn phiên làm khảo sát, vui lòng bấm nút <span class="font-semibold">Đăng xuất</span>.</li>
                    </ul>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="statsGrid">
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm skeleton h-24"></div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm skeleton h-24"></div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm skeleton h-24"></div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm skeleton h-24"></div>
            </div>

            <!-- Filter Toolbar -->
            <div class="bg-white p-2 rounded-2xl border border-slate-200/60 shadow-sm mb-6 flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                <!-- Status Filter Pills -->
                <div class="flex overflow-x-auto hide-scrollbar gap-2 p-1 flex-1" id="filterPills">
                    <button onclick="setFilter('all')" data-filter="all" class="filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap bg-primary-50 text-primary-700 transition">Tất cả</button>
                    <button onclick="setFilter('completed')" data-filter="completed" class="filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap text-slate-600 hover:bg-slate-100 transition">Hoàn thành</button>
                    <button onclick="setFilter('in_progress')" data-filter="in_progress" class="filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap text-slate-600 hover:bg-slate-100 transition">Đang làm</button>
                    <button onclick="setFilter('not_started')" data-filter="not_started" class="filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap text-slate-600 hover:bg-slate-100 transition">Chưa làm</button>
                </div>

                <!-- Sort Dropdown -->
                <div class="relative px-1">
                    <select id="sortOrder" onchange="applyFilters()" class="appearance-none w-full sm:w-auto pl-3 pr-10 py-2 text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition cursor-pointer">
                        <option value="name">Tên biểu mẫu</option>
                        <option value="status">Trạng thái</option>
                        <option value="deadline_asc">Hạn nộp (Gần nhất)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Forms Grid -->
            <div id="formsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                <div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6 skeleton h-56"></div>
                <div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6 skeleton h-56"></div>
                <div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-6 skeleton h-56"></div>
            </div>
        </div>

        <!-- Tab: Overview (Iframe) -->
        <div id="overview-pane" class="hidden fade-in">
            <iframe src="/analytics/survey-dashboard/?iframe=true" width="100%" height="900px" frameborder="0" class="block min-h-[900px] w-full"></iframe>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            fetchDashboardData();
            setInterval(fetchDashboardData, 30000);
        });

        let dashboardData = null;
        let currentFilter = 'all';

        function switchTab(tabName) {
            const formsPane = document.getElementById('forms-pane');
            const overviewPane = document.getElementById('overview-pane');
            
            const formsBtn = document.getElementById('forms-tab-btn');
            const overviewBtn = document.getElementById('overview-tab-btn');
            
            const mobileFormsBtn = document.getElementById('mobile-forms-btn');
            const mobileOverviewBtn = document.getElementById('mobile-overview-btn');

            if (tabName === 'forms') {
                formsPane.classList.remove('hidden');
                overviewPane.classList.add('hidden');
                
                formsBtn.className = "px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition";
                overviewBtn.className = "px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition";
                
                if(mobileFormsBtn) mobileFormsBtn.className = "flex-1 px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition";
                if(mobileOverviewBtn) mobileOverviewBtn.className = "flex-1 px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 transition";
            } else {
                formsPane.classList.add('hidden');
                overviewPane.classList.remove('hidden');
                
                overviewBtn.className = "px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition";
                formsBtn.className = "px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition";
                
                if(mobileOverviewBtn) mobileOverviewBtn.className = "flex-1 px-4 py-1.5 rounded-md text-sm font-medium bg-white text-slate-900 shadow-sm transition";
                if(mobileFormsBtn) mobileFormsBtn.className = "flex-1 px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 transition";
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if (btn.getAttribute('data-filter') === filter) {
                    btn.className = "filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap bg-primary-50 text-primary-700 transition";
                } else {
                    btn.className = "filter-pill px-4 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap text-slate-600 hover:bg-slate-100 transition";
                }
            });
            applyFilters();
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch('/accounts/api/survey/dashboard/');
                const data = await response.json();
                
                if (data.success) {
                    dashboardData = data;
                    renderDashboard();
                } else if (data.redirect) {
                    window.location.href = data.redirect;
                } else if (data.error === 'no_participant') {
                    document.querySelector('main').innerHTML = `
                        <div class="text-center py-20 mt-10 fade-in">
                            <div class="bg-slate-100 rounded-full inline-flex items-center justify-center mb-6 mx-auto w-20 h-20">
                                <i data-lucide="inbox" class="w-10 h-10 text-slate-400"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-900 mb-3">Chưa có biểu mẫu nào</h2>
                            <p class="text-slate-500 mb-8 max-w-md mx-auto">Bạn chưa chọn nhóm đối tượng hoặc chưa được gán biểu mẫu. Vui lòng quay lại trang chủ để chọn nhóm.</p>
                            <a href="{% url 'accounts:home' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl shadow-lg shadow-primary-600/20 transition">
                                <i data-lucide="home" class="w-5 h-5"></i>
                                Quay lại trang chủ
                            </a>
                        </div>
                    `;
                    lucide.createIcons();
                }
            } catch (e) {
                console.error("Error fetching dashboard data", e);
            }
        }

        function renderDashboard() {
            if (!dashboardData) return;
            
            const p = dashboardData.participant;
            const stats = dashboardData.stats;

            // Header
            document.getElementById('header-user-info').innerHTML = `${p.full_name}`;
            document.getElementById('header-email').innerHTML = `${p.email}`;
            document.getElementById('header-user-info').classList.remove('skeleton', 'w-32', 'h-4');
            document.getElementById('header-email').classList.remove('skeleton', 'w-24', 'h-3');

            document.getElementById('targetGroupName').innerHTML = `
                ${p.target_group_name}
                ${p.target_group_code ? `<span class="text-slate-400 font-normal text-base ml-1">(${p.target_group_code})</span>` : ''}
            `;
            document.getElementById('targetFormCount').innerHTML = `${stats.total} biểu mẫu được gán`;

            // Stats
            document.getElementById('statsGrid').innerHTML = `
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm flex items-center gap-4 hover:shadow-md transition">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="file-text" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-900">${stats.total}</p>
                        <p class="text-sm text-slate-500 font-medium">Tổng biểu mẫu</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm flex items-center gap-4 hover:shadow-md transition">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-900">${stats.completed}</p>
                        <p class="text-sm text-slate-500 font-medium">Hoàn thành</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm flex items-center gap-4 hover:shadow-md transition">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="clock" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-900">${stats.in_progress}</p>
                        <p class="text-sm text-slate-500 font-medium">Đang làm</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200/60 shadow-sm flex items-center gap-4 hover:shadow-md transition">
                    <div class="w-12 h-12 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="inbox" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-slate-900">${stats.not_started}</p>
                        <p class="text-sm text-slate-500 font-medium">Chưa bắt đầu</p>
                    </div>
                </div>
            `;

            applyFilters();
            lucide.createIcons();
        }

        function applyFilters() {
            if (!dashboardData) return;
            const sortOrder = document.getElementById('sortOrder').value;

            let filtered = dashboardData.forms.filter(f => {
                if (currentFilter !== 'all' && f.status !== currentFilter && !(f.status === 'overdue' && currentFilter === 'not_started')) return false;
                return true;
            });

            filtered.sort((a, b) => {
                if (sortOrder === 'status') {
                    const statusOrder = { 'in_progress': 0, 'not_started': 1, 'overdue': 1, 'completed': 2 };
                    return statusOrder[a.status] - statusOrder[b.status];
                } else if (sortOrder === 'deadline_asc') {
                    const dateA = a.end_date ? new Date(a.end_date).getTime() : Infinity;
                    const dateB = b.end_date ? new Date(b.end_date).getTime() : Infinity;
                    return dateA - dateB;
                } else if (sortOrder === 'name') {
                    return a.form_name.localeCompare(b.form_name);
                }
                return 0;
            });

            renderForms(filtered);
        }

        function renderForms(forms) {
            const container = document.getElementById('formsGrid');
            if (forms.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 rounded-2xl border border-dashed border-slate-300 bg-white/50">
                        <i data-lucide="search-x" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-slate-500 font-medium">Không tìm thấy biểu mẫu nào khớp với bộ lọc.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = forms.map(f => {
                let badgeClass = '', badgeText = '', badgeIcon = '';
                if (f.status === 'completed') { 
                    badgeClass = 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10'; 
                    badgeText = 'Hoàn thành'; badgeIcon = 'check-circle-2';
                } else if (f.status === 'in_progress') { 
                    badgeClass = 'bg-blue-50 text-blue-700 ring-1 ring-blue-600/10'; 
                    badgeText = 'Đang làm'; badgeIcon = 'clock';
                } else { 
                    badgeClass = 'bg-slate-100 text-slate-600 ring-1 ring-slate-500/10'; 
                    badgeText = 'Chưa làm'; badgeIcon = 'circle';
                }

                let categoryBadge = '';
                if (f.category_prefix) {
                    let catColor = 'bg-slate-100 text-slate-600';
                    if (f.category_prefix === 'CCHC') catColor = 'bg-indigo-50 text-indigo-700 ring-1 ring-indigo-600/10';
                    else if (f.category_prefix === 'SIPAS') catColor = 'bg-teal-50 text-teal-700 ring-1 ring-teal-600/10';
                    categoryBadge = `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold ${catColor}">${f.category_prefix}</span>`;
                }

                let deadlineHtml = '';
                if (f.end_date) {
                    const end = new Date(f.end_date);
                    const now = new Date();
                    const dateStr = end.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit', year: 'numeric'});
                    if (end < now && f.status !== 'completed') {
                        deadlineHtml = `<div class="flex items-center gap-1.5 text-xs font-medium text-red-600"><i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>Quá hạn: ${dateStr}</div>`;
                    } else {
                        deadlineHtml = `<div class="flex items-center gap-1.5 text-xs font-medium text-slate-500"><i data-lucide="calendar" class="w-3.5 h-3.5"></i>Hạn nộp: ${dateStr}</div>`;
                    }
                }

                let pbColor = 'bg-blue-500';
                if (f.status === 'completed') pbColor = 'bg-emerald-500';
                else if (f.progress_percent === 0) pbColor = 'bg-slate-300';
                
                let actionHtml = '';
                const continueUrl = `/accounts/survey-dashboard/continue/${f.id}/`;
                if (f.status === 'completed') {
                    actionHtml = `<button class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-700 text-sm font-medium rounded-lg ring-1 ring-emerald-600/10 cursor-default"><i data-lucide="check" class="w-4 h-4"></i> Xong</button>`;
                    if (f.response_id) {
                        actionHtml += `<a href="/accounts/export/${f.response_id}/pdf/" target="_blank" class="flex items-center justify-center w-8 h-8 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition" title="Tải PDF"><i data-lucide="download" class="w-4 h-4"></i></a>`;
                    }
                } else if (f.status === 'in_progress') {
                    actionHtml = `<a href="${continueUrl}" class="flex items-center gap-1.5 px-4 py-1.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-sm shadow-primary-600/20 transition">Tiếp tục <i data-lucide="arrow-right" class="w-4 h-4"></i></a>`;
                } else {
                    actionHtml = `<a href="${continueUrl}" class="flex items-center gap-1.5 px-4 py-1.5 bg-white hover:bg-slate-50 text-primary-700 text-sm font-medium rounded-lg ring-1 ring-inset ring-primary-600/20 transition">Bắt đầu <i data-lucide="arrow-right" class="w-4 h-4"></i></a>`;
                }

                return `
                    <div class="form-card bg-white rounded-2xl border border-slate-200/60 shadow-sm flex flex-col overflow-hidden group">
                        <div class="h-1 w-full bg-slate-100">
                            <div class="h-full ${pbColor} transition-all duration-1000" style="width: ${f.progress_percent}%"></div>
                        </div>
                        
                        <div class="p-5 flex flex-col flex-1">
                            <div class="flex items-start justify-between gap-3 mb-3">
                                <div class="flex items-center gap-2 flex-wrap">
                                    ${categoryBadge}
                                    ${f.is_required ? `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold bg-rose-50 text-rose-700 ring-1 ring-rose-600/10">Bắt buộc</span>` : ''}
                                </div>
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-semibold ${badgeClass}">
                                    <i data-lucide="${badgeIcon}" class="w-3 h-3"></i> ${badgeText}
                                </span>
                            </div>

                            <h3 class="text-base font-bold text-slate-900 mb-2 line-clamp-2 group-hover:text-primary-600 transition">${f.form_name}</h3>
                            <p class="text-xs font-medium text-slate-400 mb-4">Mã BM: ${f.form_code}</p>

                            <div class="flex-1 flex flex-col gap-2 mb-6">
                                ${deadlineHtml}
                                <div class="flex items-center justify-between text-xs font-medium text-slate-500 mt-auto pt-2">
                                    <span>Tiến độ</span>
                                    <span class="${f.status === 'completed' ? 'text-emerald-600' : 'text-slate-900'} font-bold">${f.progress_percent}%</span>
                                </div>
                            </div>

                            <div class="flex items-center justify-between gap-3 pt-4 border-t border-slate-100">
                                <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                                    <i data-lucide="user" class="w-3.5 h-3.5"></i> Cá nhân
                                </div>
                                <div class="flex items-center gap-2">${actionHtml}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }
    </script>
</body>
</html>
