{% extends "base.html" %}
{% load static %}

{% block content %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phiếu Khảo Sát</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .question-card { transition: border-color 0.2s, box-shadow 0.2s; }
    .question-card.answered { border-color: #22c55e; }
    .question-card.error { border-color: #ef4444; }
    .likert-table th { position: sticky; top: 0; background: #f8fafc; z-index: 2; }
    .matrix-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .progress-fill { transition: width 0.4s ease; }
    .star-btn { cursor: pointer; transition: color 0.15s; }
    .star-btn:hover, .star-btn.active { color: #f59e0b; }
    .slider-input { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: #e2e8f0; outline: none; }
    .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #2563eb; cursor: pointer; }
    .nav-item { transition: background 0.2s, color 0.2s; }
    .nav-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
    .nav-item.completed { color: #16a34a; }
    .nav-item.completed .step-indicator { background: #16a34a; border-color: #16a34a; color: white; }
    .mobile-step.completed { background: #dcfce7; color: #16a34a; }
    .nav-item .step-indicator { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #cbd5e1; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 600; transition: all 0.2s; }
    .nav-item.active .step-indicator { background: #2563eb; border-color: #2563eb; color: white; }
    .nav-item.completed .step-indicator { background: #16a34a; border-color: #16a34a; color: white; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 14px 24px;
      border-radius: 10px; color: white; font-size: 14px; font-weight: 500;
      z-index: 9999; animation: slideUp 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      max-width: 400px;
    }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }
    .toast.warning { background: #f59e0b; }
    .toast.info { background: #2563eb; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast.hiding { animation: fadeOut 0.3s ease forwards; }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    @media (max-width: 768px) { .sidebar { display: none; } .mobile-stepper { display: flex; } }
    @media (min-width: 769px) { .mobile-stepper { display: none; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
  <!-- Header -->
  <header class="w-full bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center gap-4 mb-3">
        <div class="flex-1">
          <h1 id="survey-title" class="font-bold text-slate-900 text-xl md:text-2xl">Đang tải...</h1>
          <p id="survey-desc" class="text-slate-500 text-sm mt-0.5"></p>
        </div>
        <span class="hidden md:inline-flex items-center gap-1 px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-xs font-medium">
          <i data-lucide="shield-check" style="width:14px;height:14px"></i> Chính thức
        </span>
      </div>
      <div class="flex items-center gap-4 text-xs text-slate-500 mb-2">
        <span class="flex items-center gap-1"><i data-lucide="clock" style="width:14px;height:14px"></i> ~5-10 phút</span>
        <span class="flex items-center gap-1"><i data-lucide="list" style="width:14px;height:14px"></i> <span id="q-count">0</span> câu hỏi</span>
        <span class="flex items-center gap-1" id="response-status">
          <i data-lucide="file-text" style="width:14px;height:14px"></i> <span id="status-text">Bản nháp</span>
        </span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
          <div id="progress-bar" class="progress-fill h-full bg-blue-600 rounded-full" style="width:0%"></div>
        </div>
        <span id="progress-text" class="text-xs font-medium text-slate-600">0%</span>
      </div>
    </div>
  </header>

  <!-- Mobile Stepper - Generated dynamically -->
  <div class="mobile-stepper overflow-x-auto gap-1 px-4 py-2 bg-white border-b border-slate-100" id="mobile-stepper"></div>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto flex gap-6 px-4 py-6">
    <!-- Sidebar - Generated dynamically -->
    <aside class="sidebar w-64 flex-shrink-0">
      <nav class="sticky top-28 bg-white rounded-xl border border-slate-200 p-3 space-y-1" id="sidebar-nav"></nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 max-w-3xl">
      <!-- Sections container -->
      <div id="sections-container"></div>

      <!-- Navigation -->
      <div class="flex items-center justify-between py-4" id="nav-controls">
        <button id="btn-prev" type="button" class="hidden px-5 py-2.5 rounded-lg border border-slate-300 text-sm font-medium text-slate-700 hover:bg-slate-50 transition flex items-center gap-2">
          <i data-lucide="chevron-left" style="width:16px;height:16px"></i> Quay lại
        </button>
        <div class="flex gap-3 ml-auto">
          <button id="btn-save" type="button" class="px-5 py-2.5 rounded-lg border border-slate-300 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">
            💾 Lưu tạm
          </button>
          <button id="btn-next" type="button" class="px-6 py-2.5 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition flex items-center gap-2">
            <span id="btn-next-label">Tiếp theo</span>
            <i data-lucide="chevron-right" style="width:16px;height:16px"></i>
          </button>
        </div>
      </div>

      <!-- Success state -->
      <div id="success-screen" class="hidden bg-white rounded-xl border border-slate-200 p-12 text-center fade-in">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="check-circle" style="width:32px;height:32px;color:#16a34a"></i>
        </div>
        <h2 class="font-bold text-xl text-slate-900 mb-2">🎉 Cảm ơn bạn!</h2>
        <p class="text-slate-500">Khảo sát đã được gửi thành công. Cảm ơn bạn đã dành thời gian!</p>
      </div>
    </main>
  </div>

<script>
// ============================================
// SURVEY PUBLIC APP - DYNAMIC VERSION
// ============================================

const SURVEY_ID = {{ survey_id }};
let surveyData = null;
let responseData = null;
let answers = {};
let currentSectionIndex = 0;
let isSubmitting = false;
let startTime = Date.now();
let saveTimeout = null;

// ============================================
// API CLIENT
// ============================================
const API = {
  async request(endpoint, method = 'GET', data = null) {
    const url = `/survey/api/public${endpoint}`;
    const options = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCsrfToken()
      },
      credentials: 'same-origin'
    };
    if (data) options.body = JSON.stringify(data);
    const res = await fetch(url, options);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    return res.json();
  },
  getSurvey(id) { return this.request(`/surveys/${id}/`); },
  getResponse(id) { return this.request(`/surveys/${id}/response/`); },
  submitResponse(data) { return this.request('/responses/submit/', 'POST', data); }
};

function getCsrfToken() {
  const cookieValue = document.cookie.split('; ').find(row => row.startsWith('csrftoken='));
  return cookieValue ? cookieValue.split('=')[1] : '';
}

// ============================================
// HELPERS
// ============================================
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg, type = 'info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ============================================
// RENDER FUNCTIONS - Dynamic from backend
// ============================================
function renderSurvey(data) {
  surveyData = data;
  
  // Update header
  document.getElementById('survey-title').textContent = data.title || 'Khảo sát';
  document.getElementById('survey-desc').textContent = data.description || '';
  
  // Count total questions
  let totalQ = 0;
  data.sections.forEach(s => {
    s.questions.forEach(q => {
      const type = q.question_type_code || '';
      if (!['title', 'paragraph', 'section-break'].includes(type)) {
        totalQ++;
      }
    });
  });
  document.getElementById('q-count').textContent = totalQ;
  
  // Render sidebar nav
  renderSidebar(data.sections);
  
  // Render mobile stepper
  renderMobileStepper(data.sections);
  
  // Render sections
  renderSections(data.sections);
  
  // Show first section
  showSection(0);
  
  // Update progress
  updateProgress();
}

function renderSidebar(sections) {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  sections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-2';
    btn.dataset.section = i;
    btn.innerHTML = `
      <span class="step-indicator">${i + 1}</span>
      <span class="flex-1">${s.code || s.title || `Phần ${i+1}`}</span>
    `;
    btn.onclick = () => showSection(i);
    nav.appendChild(btn);
  });
}

function renderMobileStepper(sections) {
  const container = document.getElementById('mobile-stepper');
  container.innerHTML = '';
  sections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'mobile-step flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap';
    btn.dataset.section = i;
    btn.textContent = s.code || s.title || `Phần ${i+1}`;
    btn.onclick = () => showSection(i);
    container.appendChild(btn);
  });
}

function renderSections(sections) {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  
  sections.forEach((section, sIdx) => {
    const sectionDiv = document.createElement('section');
    sectionDiv.className = 'survey-section hidden fade-in';
    sectionDiv.dataset.sectionIndex = sIdx;
    
    // Section header
    let html = `
      <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
        <h2 class="font-bold text-lg text-slate-900 mb-1">${escapeHtml(section.title)}</h2>
        <p class="text-sm text-slate-500 mb-6">${escapeHtml(section.description || '')}</p>
    `;
    
    // Render questions
    section.questions.forEach((q, qIdx) => {
      html += renderQuestion(q, qIdx);
    });
    
    html += `</div>`;
    sectionDiv.innerHTML = html;
    container.appendChild(sectionDiv);
  });
}

function renderQuestion(q, index) {
  const type = q.question_type_code || 'paragraph';
  const required = q.is_required ? '<span class="text-red-500">*</span>' : '';
  const desc = q.description ? `<p class="text-sm text-slate-600 mb-3">${escapeHtml(q.description)}</p>` : '';
  const qid = q.id;
  const answer = answers[qid] || '';
  
  let inputHtml = '';
  
  switch(type) {
    case 'title':
      return `<div class="question-card border border-slate-200 rounded-lg p-5 mb-5" data-qid="${qid}" data-question-type="title">
        <div class="text-center"><h3 class="font-bold text-lg">${escapeHtml(q.title)}</h3>${desc}</div>
      </div>`;
    
    case 'paragraph':
      return `<div class="question-card border border-slate-200 rounded-lg p-5 mb-5" data-qid="${qid}" data-question-type="paragraph">
        <p class="text-sm text-slate-700">${escapeHtml(q.title)}</p>
      </div>`;
    
    case 'short-text':
      inputHtml = `<input type="text" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                    placeholder="${escapeHtml(q.config?.placeholder || 'Nhập câu trả lời...')}" 
                    value="${escapeHtml(answer)}" data-qid="${qid}">`;
      break;
    
    case 'long-text':
      inputHtml = `<textarea rows="4" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-y" 
                    placeholder="${escapeHtml(q.config?.placeholder || 'Nhập nội dung...')}" data-qid="${qid}">${escapeHtml(answer)}</textarea>`;
      break;
    
    case 'single-choice': {
      const opts = q.options || [];
      inputHtml = `<div class="space-y-2">`;
      opts.forEach(opt => {
        const checked = answer === opt ? 'checked' : '';
        inputHtml += `
          <label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition">
            <input type="radio" name="q${qid}" value="${escapeHtml(opt)}" ${checked} data-qid="${qid}">
            <span class="text-sm">${escapeHtml(opt)}</span>
          </label>`;
      });
      inputHtml += `</div>`;
      break;
    }
    
    case 'multi-choice': {
      const opts = q.options || [];
      const selected = Array.isArray(answer) ? answer : [];
      inputHtml = `<div class="space-y-2">`;
      opts.forEach(opt => {
        const checked = selected.includes(opt) ? 'checked' : '';
        inputHtml += `
          <label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition">
            <input type="checkbox" value="${escapeHtml(opt)}" ${checked} data-qid="${qid}">
            <span class="text-sm">${escapeHtml(opt)}</span>
          </label>`;
      });
      inputHtml += `</div>`;
      break;
    }
    
    case 'rating-grid': {
      const cfg = q.config || {};
      const criteria = cfg.criteria || ['Tiêu chí 1'];
      const scale = cfg.scale || [{value:1,label:'Có'},{value:2,label:'Không'}];
      const gridAns = answers[qid] || {};
      
      inputHtml = `
        <div class="matrix-scroll">
          <table class="w-full text-sm border-collapse min-w-[400px]">
            <thead><tr class="bg-slate-50">
              <th class="text-left p-3 font-medium text-slate-700">${escapeHtml(cfg.criteriaLabel || 'Tiêu chí')}</th>
              ${scale.map(s => `<th class="p-3 text-center font-medium text-slate-600">${escapeHtml(s.label)}</th>`).join('')}
            </tr></thead>
            <tbody>`;
      criteria.forEach((c, ri) => {
        inputHtml += `<tr class="border-t border-slate-100">
          <td class="p-3 text-slate-700">${escapeHtml(c)}</td>`;
        scale.forEach(s => {
          const checked = gridAns[ri] === s.value ? 'checked' : '';
          inputHtml += `<td class="p-3 text-center">
            <input type="radio" name="grid_${qid}_${ri}" value="${s.value}" ${checked} data-qid="${qid}" data-row="${ri}">
          </td>`;
        });
        inputHtml += `</tr>`;
      });
      inputHtml += `</tbody></table></div>`;
      break;
    }
    
    case 'section-break':
      return `<div class="question-card border border-slate-200 rounded-lg p-5 mb-5" data-qid="${qid}" data-question-type="section-break">
        <hr class="my-2"><h3 class="font-bold text-center">${escapeHtml(q.title)}</h3>${desc}
      </div>`;
    
    case 'data-table': {
      const cfg = q.config || {};
      const columns = cfg.columns && cfg.columns.length > 0 ? cfg.columns : ['Cột 1', 'Cột 2', 'Cột 3'];
      const numRows = cfg.rows || 1;
      const tableAns = answer && typeof answer === 'object' && !Array.isArray(answer) ? answer : {};

      let dtHeaderHtml = '';
      columns.forEach((col, ci) => {
        dtHeaderHtml += `<th class="p-3 text-center font-medium text-slate-600 bg-slate-50 border border-slate-200">${escapeHtml(col)}</th>`;
      });

      let dtBodyHtml = '';
      for (let ri = 0; ri < numRows; ri++) {
        dtBodyHtml += `<tr>`;
        columns.forEach((col, ci) => {
          const cellKey = `${ri}_${ci}`;
          const cellVal = tableAns[cellKey] || '';
          dtBodyHtml += `<td class="p-1.5 border border-slate-200">
            <input type="text" class="w-full border-0 bg-transparent text-sm text-center outline-none focus:ring-0" value="${escapeHtml(cellVal)}" data-qid="${qid}" data-row="${ri}" data-col="${ci}" placeholder="...">
          </td>`;
        });
        dtBodyHtml += `</tr>`;
      }

      inputHtml = `
        <div class="overflow-x-auto">
          <table class="w-full text-sm border-collapse min-w-[400px]">
            <thead><tr>${dtHeaderHtml}</tr></thead>
            <tbody>${dtBodyHtml}</tbody>
          </table>
        </div>`;
      break;
    }
    
    default:
      inputHtml = `<p class="text-sm text-slate-500">Loại câu hỏi: ${type}</p>`;
  }
  
  return `
    <div class="question-card border border-slate-200 rounded-lg p-5 mb-5" data-qid="${qid}" data-question-type="${type}" data-required="${q.is_required}">
      <label class="block text-sm font-medium text-slate-800 mb-1">${index+1}. ${escapeHtml(q.title)} ${required}</label>
      ${desc}
      ${inputHtml}
      <p class="error-msg text-xs text-red-500 mt-1.5 hidden">⚠ Vui lòng trả lời câu hỏi này.</p>
    </div>
  `;
}

// ============================================
// NAVIGATION
// ============================================
function showSection(idx) {
  const sections = document.querySelectorAll('.survey-section');
  const navItems = document.querySelectorAll('.nav-item');
  const mobileSteps = document.querySelectorAll('.mobile-step');
  
  sections.forEach((s, i) => s.classList.toggle('hidden', i !== idx));
  navItems.forEach((n, i) => {
    n.classList.toggle('active', i === idx);
  });
  mobileSteps.forEach((m, i) => {
    m.classList.toggle('bg-blue-100', i === idx);
    m.classList.toggle('text-blue-700', i === idx);
    m.classList.toggle('bg-slate-100', i !== idx);
    m.classList.toggle('text-slate-600', i !== idx);
  });
  
  document.getElementById('btn-prev').classList.toggle('hidden', idx === 0);
  
  const total = sections.length;
  const label = document.getElementById('btn-next-label');
  if (idx === total - 1) {
    label.textContent = '📤 Gửi khảo sát';
  } else {
    label.textContent = 'Tiếp theo →';
  }
  
  currentSectionIndex = idx;
  updateProgress();
}

function nextSection() {
  const sections = document.querySelectorAll('.survey-section');
  if (currentSectionIndex < sections.length - 1) {
    showSection(currentSectionIndex + 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    submitSurvey();
  }
}

function prevSection() {
  if (currentSectionIndex > 0) {
    showSection(currentSectionIndex - 1);
  }
}

// ============================================
// ANSWER HANDLING
// ============================================
function collectAnswers() {
  const newAnswers = {};
  
  document.querySelectorAll('.question-card[data-qid]').forEach(card => {
    const qid = parseInt(card.dataset.qid);
    if (!qid) return;
    
    // Data-table cells (inputs with data-row and data-col)
    const dtInputs = card.querySelectorAll('input[data-row][data-col]');
    if (dtInputs.length > 0) {
      const dtAns = {};
      dtInputs.forEach(inp => {
        const v = inp.value.trim();
        if (v) {
          dtAns[`${inp.dataset.row}_${inp.dataset.col}`] = v;
        }
      });
      if (Object.keys(dtAns).length) newAnswers[qid] = dtAns;
      return;
    }

    // Text inputs
    const textInput = card.querySelector('input[type="text"], input[type="email"], input[type="tel"]');
    if (textInput) {
      const val = textInput.value.trim();
      if (val) newAnswers[qid] = val;
      return;
    }
    
    // Textarea
    const textarea = card.querySelector('textarea');
    if (textarea) {
      const val = textarea.value.trim();
      if (val) newAnswers[qid] = val;
      return;
    }
    
    // Radio buttons (single choice)
    const radioChecked = card.querySelector('input[type="radio"]:checked');
    if (radioChecked && !radioChecked.name.startsWith('grid_')) {
      newAnswers[qid] = radioChecked.value;
      return;
    }
    
    // Radio buttons (rating grid)
    const gridRadios = card.querySelectorAll('input[type="radio"]:checked');
    if (gridRadios.length > 0 && gridRadios[0].name.startsWith('grid_')) {
      const gridAns = {};
      gridRadios.forEach(r => {
        const row = parseInt(r.dataset.row);
        if (!isNaN(row)) gridAns[row] = r.value;
      });
      // Chỉ tính là đã trả lời khi tất cả các hàng trong lưới đều được chọn
      const totalRows = card.querySelectorAll('tbody tr').length;
      if (Object.keys(gridAns).length === totalRows) {
        newAnswers[qid] = gridAns;
      }
      return;
    }
    
    // Checkboxes (multi choice)
    const checkboxes = card.querySelectorAll('input[type="checkbox"]:checked');
    if (checkboxes.length > 0) {
      newAnswers[qid] = Array.from(checkboxes).map(cb => cb.value);
      return;
    }
    
    // Slider
    const slider = card.querySelector('.slider-input');
    if (slider) {
      newAnswers[qid] = parseInt(slider.value);
      return;
    }
    
    // Stars
    const stars = card.querySelector('.rating-stars');
    if (stars) {
      const val = parseInt(stars.dataset.value || 0);
      if (val > 0) newAnswers[qid] = val;
      return;
    }
  });
  
  return newAnswers;
}

function onAnswerChange() {
  answers = collectAnswers();
  updateProgress();
  updateStatus();
  scheduleSave();
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveDraft(), 3000);
}

// ============================================
// PROGRESS
// ============================================
function isAnswerFilled(a) {
  if (a === undefined || a === null) return false;
  if (typeof a === 'string') return a.trim() !== '';
  if (Array.isArray(a)) return a.length > 0;
  if (typeof a === 'object') return Object.keys(a).length > 0;
  return a !== '';
}

function isGridComplete(card) {
  if (!card) return false;
  const totalRows = card.querySelectorAll('tbody tr').length;
  if (totalRows === 0) return false;
  const checkedRows = card.querySelectorAll('input[type="radio"]:checked').length;
  return checkedRows === totalRows;
}

function updateProgress() {
  const cards = document.querySelectorAll('.question-card[data-qid]');
  let total = 0, answered = 0;
  
  cards.forEach(card => {
    const qid = parseInt(card.dataset.qid);
    if (!qid) return;
    // Bỏ qua các trường không phải câu hỏi (đoạn văn, tiêu đề, section-break)
    const questionType = card.dataset.questionType;
    if (['title', 'paragraph', 'section-break'].includes(questionType)) return;
    const ans = answers[qid];
    if (questionType === 'rating-grid') {
      // Lưới đánh giá: chỉ tính hoàn thành khi chọn hết tất cả hàng
      if (isGridComplete(card)) answered++;
    } else if (isAnswerFilled(ans)) {
      answered++;
    }
    total++;
  });
  
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '% (' + answered + '/' + total + ')';
  
  // Helper to check if a section is fully answered
  function isSectionComplete(section) {
    if (!section) return false;
    const qs = section.questions.filter(q => {
      const type = q.question_type_code || '';
      return !['title', 'paragraph', 'section-break'].includes(type);
    });
    if (qs.length === 0) return false;
    return qs.every(q => isAnswerFilled(answers[q.id]));
  }
  
  // Update sidebar nav items
  document.querySelectorAll('.nav-item').forEach((btn, i) => {
    const section = surveyData?.sections?.[i];
    if (isSectionComplete(section)) {
      btn.classList.add('completed');
    } else {
      btn.classList.remove('completed');
    }
  });
  
  // Update mobile stepper
  document.querySelectorAll('.mobile-step').forEach((btn, i) => {
    const section = surveyData?.sections?.[i];
    if (isSectionComplete(section)) {
      btn.classList.add('completed');
    } else {
      btn.classList.remove('completed');
    }
  });
}

// ============================================
// STATUS
// ============================================
function updateStatus(state) {
  const text = document.getElementById('status-text');
  if (state === 'saved') {
    text.textContent = '✅ Đã lưu';
    text.style.color = '#16a34a';
  } else if (state === 'error') {
    text.textContent = '❌ Lỗi lưu';
    text.style.color = '#dc2626';
  } else {
    text.textContent = '📝 Bản nháp';
    text.style.color = '#64748b';
  }
}

// ============================================
// SAVE DRAFT
// ============================================
async function saveDraft() {
  if (isSubmitting) return;
  try {
    const res = await API.submitResponse({
      survey_id: SURVEY_ID,
      response_id: responseData?.id,
      answers: answers,
      status: 'draft',
      time_taken: Math.round((Date.now() - startTime) / 1000)
    });
    if (res.success) {
      responseData = res;
      updateStatus('saved');
      document.getElementById('btn-save').textContent = '✅ Đã lưu';
      setTimeout(() => { document.getElementById('btn-save').textContent = '💾 Lưu tạm'; }, 2000);
    }
  } catch (e) {
    updateStatus('error');
    showToast('Lỗi lưu: ' + e.message, 'error');
  }
}

// ============================================
// SUBMIT
// ============================================
function checkRequired() {
  const missing = [];
  document.querySelectorAll('.question-card[data-required="true"]').forEach(card => {
    // Bỏ qua các trường không phải câu hỏi
    const questionType = card.dataset.questionType;
    if (['title', 'paragraph', 'section-break'].includes(questionType)) return;
    const qid = parseInt(card.dataset.qid);
    const ans = answers[qid];
    // Lưới đánh giá: kiểm tra tất cả hàng đã được chọn
    if (questionType === 'rating-grid') {
      if (isGridComplete(card)) return;
    }
    if (ans === undefined || ans === null || ans === '' || (Array.isArray(ans) && !ans.length) || (typeof ans === 'object' && !Object.keys(ans).length)) {
      const title = card.querySelector('.text-sm.font-medium')?.textContent?.replace(/[0-9]+\.\s*/, '').replace(/\*/g, '').trim() || `Câu ${qid}`;
      missing.push(title);
      card.classList.add('error');
    } else {
      card.classList.remove('error');
    }
  });
  return missing;
}

function submitSurvey() {
  const missing = checkRequired();
  if (missing.length > 0) {
    showToast(`⚠ Vui lòng trả lời: ${missing.join(', ')}`, 'warning');
    return;
  }
  
  if (!confirm('Bạn có chắc chắn muốn nộp khảo sát này?')) return;
  
  isSubmitting = true;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = 'Đang gửi...';
  
  API.submitResponse({
    survey_id: SURVEY_ID,
    response_id: responseData?.id,
    answers: answers,
    status: 'submitted',
    time_taken: Math.round((Date.now() - startTime) / 1000)
  }).then(res => {
    if (res.success) {
      document.querySelectorAll('.question-card input, .question-card textarea, .question-card select').forEach(el => el.disabled = true);
      document.getElementById('nav-controls').classList.add('hidden');
      document.querySelectorAll('.survey-section').forEach(s => s.classList.add('hidden'));
      document.getElementById('success-screen').classList.remove('hidden');
      document.getElementById('status-text').textContent = '✅ Đã nộp';
      document.getElementById('status-text').style.color = '#16a34a';
      showToast('🎉 Khảo sát đã được gửi thành công!', 'success');
    }
  }).catch(e => {
    showToast('Lỗi khi gửi: ' + e.message, 'error');
  }).finally(() => {
    isSubmitting = false;
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-next').textContent = '📤 Gửi khảo sát';
  });
}

// ============================================
// EVENT BINDING
// ============================================
function bindEvents() {
  // Navigation
  document.getElementById('btn-prev').addEventListener('click', prevSection);
  document.getElementById('btn-next').addEventListener('click', nextSection);
  document.getElementById('btn-save').addEventListener('click', saveDraft);
  
  // Answer tracking - delegate events
  document.getElementById('sections-container').addEventListener('change', (e) => {
    const target = e.target;
    if (target.closest('.question-card')) {
      // Mark answered
      const card = target.closest('.question-card');
      if (card) card.classList.add('answered');
      onAnswerChange();
    }
  });
  
  document.getElementById('sections-container').addEventListener('input', (e) => {
    const target = e.target;
    if (target.closest('.question-card')) {
      const card = target.closest('.question-card');
      if (target.value && target.value.trim()) {
        card.classList.add('answered');
      } else {
        card.classList.remove('answered');
      }
      onAnswerChange();
    }
  });
  
  // Stars
  document.addEventListener('click', (e) => {
    const star = e.target.closest('.star-btn');
    if (star) {
      const container = star.closest('.rating-stars');
      const val = parseInt(star.dataset.star);
      container.dataset.value = val;
      container.querySelectorAll('.star-btn').forEach((s, i) => {
        s.classList.toggle('active', i < val);
        s.classList.toggle('text-amber-400', i < val);
        s.classList.toggle('text-slate-300', i >= val);
      });
      const card = container.closest('.question-card');
      if (card) card.classList.add('answered');
      onAnswerChange();
    }
  });
  
  // Slider
  document.addEventListener('input', (e) => {
    const slider = e.target.closest('.slider-input');
    if (slider) {
      const display = slider.parentElement.querySelector('.slider-value');
      if (display) display.textContent = slider.value;
      const card = slider.closest('.question-card');
      if (card) card.classList.add('answered');
      onAnswerChange();
    }
  });
  
  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveDraft();
    }
  });
}

// ============================================
// INIT
// ============================================
async function init() {
  try {
    const [survey, response] = await Promise.all([
      API.getSurvey(SURVEY_ID),
      API.getResponse(SURVEY_ID)
    ]);
    
    surveyData = survey;
    responseData = response;
    answers = response.answers || {};
    
    renderSurvey(survey);
    bindEvents();
    updateProgress();
    updateStatus();
    
    // Auto-save every 30s
    setInterval(() => {
      if (Object.keys(answers).length > 0) saveDraft();
    }, 300000);
    
    // Restore saved answers
    if (Object.keys(answers).length > 0) {
      showToast('💾 Đã khôi phục dữ liệu đã lưu', 'info');
    }
    
  } catch (error) {
    console.error('Init error:', error);
    document.getElementById('survey-title').textContent = '⚠ Không thể tải khảo sát';
    document.getElementById('survey-desc').textContent = error.message;
    showToast('Lỗi: ' + error.message, 'error');
  }
}

// Start
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  init();
});
</script>
</body>
</html>
