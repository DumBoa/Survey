    const CHECKBOX_RE = /[☐☑☒□]/g;
    const CHECKBOX_TEST_RE = /[☐☑☒□]/;

    function handleWordImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const arrayBuffer = e.target.result;
        mammoth.convertToHtml({ arrayBuffer: arrayBuffer }).then((result) => {
          const html = result.value;
          const activePage = getActivePage();
          const content = activePage.querySelector(".page-content");
          const temp = document.createElement("div");
          temp.innerHTML = html;
          temp.querySelectorAll('a[id^="_Toc"], a[name]').forEach((a) => { if (!a.textContent.trim()) a.remove(); });
          const blocks = parseWordBlocks(temp);
          blocks.forEach((block) => appendImportedBlock(content, block));
          reattachEvents();
          markDirty();
          window.updateSectionManager();
          if (result.messages && result.messages.length) console.warn("Mammoth messages:", result.messages);
          showToast(`Đã import ${blocks.length} thành phần từ Word!`, "success");
        }).catch((err) => { showToast("Lỗi import: " + err.message, "error"); });
      };
      reader.readAsArrayBuffer(file);
      event.target.value = "";
    }

    function parseWordBlocks(root) {
      const children = Array.from(root.children);
      const n = children.length;
      const rawItems = children.map((el) => {
        const tag = el.tagName.toLowerCase();
        const text = el.textContent.trim();
        return { el, tag, text, isTable: tag === "table", isEmpty: text === "", isHeading: tag === "h1" || tag === "h2" || tag === "h3" || tag === "h4" || isWholeLineBold(el), isCheckboxLine: !el.querySelector("table") && CHECKBOX_TEST_RE.test(text) && text.replace(CHECKBOX_RE, "").trim().length > 0 };
      });
      const blocks = [];
      let i = 0;
      let pendingHeading = null;
      let pendingHeadingNote = null;

      const isSectionMarkerHeading = (text) => /^(PHẦN|MỤC)\s+\S/i.test(text);
      const flushPendingHeadingAsTitle = () => {
        if (pendingHeading) {
          blocks.push({ type: isSectionMarkerHeading(pendingHeading) ? "section-break" : "title", text: pendingHeading });
          pendingHeading = null;
        }
        if (pendingHeadingNote) { blocks.push({ type: "paragraph", text: pendingHeadingNote }); pendingHeadingNote = null; }
      };

      while (i < n) {
        const item = rawItems[i];
        if (item.isTable) {
          const heading = pendingHeading; const note = pendingHeadingNote; pendingHeading = null; pendingHeadingNote = null;
          const tableBlock = parseWordTable(item.el, heading); tableBlock.note = note || ""; blocks.push(tableBlock); i++; continue;
        }
        if (item.isEmpty) { i++; continue; }
        if (item.isCheckboxLine) {
          const heading = pendingHeading; const note = pendingHeadingNote; pendingHeading = null; pendingHeadingNote = null;
          const options = []; let j = i;
          while (j < n && rawItems[j].isCheckboxLine) {
            const lineOptions = rawItems[j].text.split(CHECKBOX_RE).map((s) => s.trim()).filter(Boolean);
            options.push(...lineOptions); j++;
          }
          const finalOptions = options.length ? options : ["Lựa chọn 1", "Lựa chọn 2"];
          const isBinaryYesNo = finalOptions.length === 2 && finalOptions.every((o) => /^(có|không|yes|no)$/i.test(o.trim()));
          blocks.push({ type: isBinaryYesNo ? "single-choice" : "multi-choice", question: heading || "Lựa chọn:", options: finalOptions, note: note || "" });
          i = j; continue;
        }
        const text = item.text;
        const numberedMatch = text.match(/^((?:\d+|[a-zđA-ZĐ])[\.\)]\s+.+)$/);
        if (item.isHeading || looksLikeHeading(text)) {
          if (numberedMatch) {
            let j = i + 1; let blankFollow = false;
            while (j < n && rawItems[j].isEmpty && children[j].textContent.length > 0) { blankFollow = true; j++; }
            if (blankFollow) { flushPendingHeadingAsTitle(); blocks.push({ type: "long-text", question: numberedMatch[1] }); i = j; continue; }
          }
          flushPendingHeadingAsTitle(); pendingHeading = text; i++; continue;
        }
        if (pendingHeading && !item.isHeading) {
          const isShortCaption = text.length > 0 && text.length <= 120 && !numberedMatch;
          const nextIsTableOrCheckbox = i + 1 < n && (rawItems[i + 1].isTable || rawItems[i + 1].isCheckboxLine);
          if (isShortCaption && nextIsTableOrCheckbox) { pendingHeadingNote = pendingHeadingNote ? pendingHeadingNote + " " + text : text; i++; continue; }
        }
        flushPendingHeadingAsTitle();
        const labelMatch = text.match(/^([^:：]{2,60})[:：]\s*$/);
        if (labelMatch) { blocks.push({ type: "short-text", label: labelMatch[1].trim() }); i++; continue; }
        if (numberedMatch) {
          let j = i + 1; let blankFollow = false;
          while (j < n && rawItems[j].isEmpty && children[j].textContent.length > 0) { blankFollow = true; j++; }
          if (blankFollow) { blocks.push({ type: "long-text", question: numberedMatch[1] }); i = j; continue; }
        }
        if (/^[-•]\s+\S/.test(text)) {
          const lines = [text.replace(/^[-•]\s+/, "")]; let j = i + 1;
          while (j < n && !rawItems[j].isEmpty && /^[-•]\s+\S/.test(rawItems[j].text)) { lines.push(rawItems[j].text.replace(/^[-•]\s+/, "")); j++; }
          blocks.push({ type: "paragraph", text: lines.map((l) => "• " + l).join("\n") }); i = j; continue;
        }
        blocks.push({ type: "paragraph", text }); i++;
      }
      flushPendingHeadingAsTitle();
      return blocks;
    }

    function isWholeLineBold(el) {
      const text = el.textContent.trim();
      if (!text) return false;
      let boldText = "";
      el.querySelectorAll("strong, b").forEach((n) => { boldText += n.textContent; });
      return boldText.replace(/\s+/g, "") === text.replace(/\s+/g, "") && boldText.trim().length > 0;
    }

    function looksLikeHeading(text) {
      if (!text || text.length > 80) return false;
      if (/^(PHẦN|MỤC)\s/i.test(text)) return true;
      if (/^[A-ZĐ]\.\s+\S/.test(text)) return true;
      const isAllCaps = text === text.toUpperCase() && /[A-ZĐ]/.test(text);
      if (isAllCaps && text.split(" ").length >= 2) return true;
      return false;
    }

    function parseWordTable(tableEl, heading) {
        const rows = Array.from(tableEl.querySelectorAll("tr")).map((tr) => Array.from(tr.children).map((td) => td.textContent.trim()));
        if (rows.length === 0) return { type: "data-table", question: heading, columns: [{name: "Cột 1", type: 'text'}], data: [[""]] };
        
        const header = rows[0]; 
        const bodyRows = rows.slice(1); 
        const numCols = header.length;

        let isMixedDataTable = false;
        let dataTableCols = [];

        for(let c=0; c<numCols; c++) {
            let hasCheckboxes = false;
            let options = new Set();
            for(let r=0; r<bodyRows.length; r++) {
                let cell = bodyRows[r][c] || "";
                if (CHECKBOX_TEST_RE.test(cell)) {
                    hasCheckboxes = true;
                    cell.split(CHECKBOX_RE).forEach(opt => {
                        let txt = opt.trim();
                        if(txt) options.add(txt);
                    });
                }
            }
            if (hasCheckboxes && options.size > 0) {
                isMixedDataTable = true;
                dataTableCols.push({ name: header[c] || `Cột ${c+1}`, type: 'checkbox', options: Array.from(options) });
            } else {
                dataTableCols.push({ name: header[c] || `Cột ${c+1}`, type: 'text' });
            }
        }

        if (isMixedDataTable) {
             const cleanRows = bodyRows.map(row => {
                 return row.map((cell, c) => {
                     if (dataTableCols[c] && dataTableCols[c].type === 'checkbox') return ""; 
                     return cell;
                 });
             });
             return {
                 type: 'data-table',
                 question: heading,
                 columns: dataTableCols,
                 data: cleanRows
             };
        }

        const hasAnyRealCheckbox = bodyRows.some((r) => r.some((cell) => CHECKBOX_TEST_RE.test(cell)));
        if (!hasAnyRealCheckbox) {
            return { type: "data-table", question: heading, columns: header.map(h => ({name: h, type:'text'})), data: bodyRows };
        }
        function colCheckboxRatio(colIdx) { let checkbox = 0, total = 0; bodyRows.forEach((r) => { const cell = r[colIdx] ?? ""; total++; if (CHECKBOX_TEST_RE.test(cell) || cell === "") checkbox++; }); return total > 0 ? checkbox / total : 0; }
        let checkboxStartCol = -1;
        for (let c = 1; c < numCols; c++) { let allRestAreCheckbox = true; for (let c2 = c; c2 < numCols; c2++) { if (colCheckboxRatio(c2) <= 0.6) { allRestAreCheckbox = false; break; } } if (allRestAreCheckbox) { checkboxStartCol = c; break; } }
        if (checkboxStartCol === -1) {
            return { type: "data-table", question: heading, columns: header.map(h => ({name: h, type:'text'})), data: bodyRows };
        }
        let criteriaCol = checkboxStartCol - 1;
        const looksLikeOrdinal = (colIdx) => bodyRows.every((r) => /^\d+$/.test((r[colIdx] ?? "").trim()));
        while (criteriaCol > 0 && looksLikeOrdinal(criteriaCol)) criteriaCol--;
        const regionCols = [];
        for (let c = checkboxStartCol; c < numCols; c++) {
            const label = (header[c] || "").trim();
            const hasReal = bodyRows.some((r) => CHECKBOX_TEST_RE.test(r[c] ?? ""));
            regionCols.push({ label, hasReal });
        }
        const realCount = regionCols.filter((c) => c.hasReal).length;
        let cols, gridType;
        if (realCount >= 2) {
            const realLabels = regionCols.filter((c) => c.hasReal).map((c) => c.label);
            const isYesNo = realLabels.length >= 1 && realLabels.every((h) => /^(Có|Không|Yes|No|Cần)$/i.test(h));
            const isScale = realLabels.length >= 3 && realLabels.every((h) => /^\d+$/.test(h));
            gridType = isYesNo ? "yesno" : realLabels.length === 10 && isScale ? "scale10" : isScale ? "scale5" : "yesno";
            cols = regionCols.map((c) => ({ label: c.label, kind: c.hasReal ? "radio" : "text" }));
        } else {
            gridType = "checklist";
            cols = regionCols.map((c) => ({ label: c.label, kind: c.hasReal ? "checkbox" : "text" }));
        }
        if (!cols.length) cols = [{ label: "Có", kind: "checkbox" }];
        return { type: "rating-grid", question: heading || "Đánh giá theo từng tiêu chí:", gridType, criteriaLabel: header[criteriaCol] || "Tiêu chí", cols, criteria: bodyRows.map((r) => r[criteriaCol]).filter(Boolean) };
    }

    function appendImportedBlock(content, block) {
      const el = document.createElement("div");
      el.className = "doc-section"; el.dataset.id = "comp_" + ++componentCounter; el.dataset.required = "false"; el.dataset.questionId = null;
      const noteHtml = `<p class="component-note text-xs text-gray-400 italic mt-1.5" contenteditable="true" data-placeholder="Thêm ghi chú/hướng dẫn (không bắt buộc)...">${block.note ? escapeHtml(block.note) : ""}</p>`;
      
      if (block.type === "section-break") {
        el.dataset.type = "section-break";
        el.dataset.sectionCode = generateUniqueSectionCode();
        const headingMatch = block.text.match(/^(.+?)[\:\-–—]\s*(.+)$/);
        const sectionTitle = headingMatch ? headingMatch[1].trim() : block.text;
        const sectionDesc = headingMatch ? headingMatch[2].trim() : "";
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Phân cách (Word)</span><div class="flex items-start gap-2"><div class="flex-1"><hr class="my-3 border-gray-400"><h3 contenteditable="true" class="font-bold text-base text-gray-800">${escapeHtml(sectionTitle)}</h3><p contenteditable="true" class="text-sm text-gray-600">${escapeHtml(sectionDesc)}</p>${noteHtml}</div></div>`;
      } else if (block.type === "title") {
        el.dataset.type = "title";
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><h3 contenteditable="true" class="font-bold text-base text-gray-800">${escapeHtml(block.text)}</h3>${noteHtml}</div></div>`;
      } else if (block.type === "paragraph") {
        el.dataset.type = "paragraph";
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm text-gray-700 leading-relaxed" style="white-space: pre-wrap">${escapeHtml(block.text)}</p>${noteHtml}</div></div>`;
      } else if (block.type === "short-text") {
        el.dataset.type = "short-text";
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-1 font-medium">${escapeHtml(block.label)}:</p><input class="survey-input text-sm" placeholder="Câu trả lời ngắn">${noteHtml}</div></div>`;
      } else if (block.type === "long-text") {
        el.dataset.type = "long-text";
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-1 font-medium">${escapeHtml(block.question)}</p><div contenteditable="true" class="border border-gray-300 rounded-lg h-20 p-3 text-sm text-gray-400 hover:border-blue-400 focus:border-blue-500 transition">Nhập nội dung...</div>${noteHtml}</div></div>`;
      } else if (block.type === "single-choice") {
        el.dataset.type = "single-choice";
        const groupName = "q" + ++componentCounter + "_" + Date.now();
        const optionsHtml = buildOptionsHtml(block.options, "radio", groupName);
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-2 font-medium">${escapeHtml(block.question)}</p><div class="space-y-1 text-sm pl-4 options-container">${optionsHtml}<button onclick="addOption(this)" class="text-xs text-blue-600 hover:text-blue-800 mt-1">+ Thêm lựa chọn</button></div>${noteHtml}</div></div>`;
      } else if (block.type === "multi-choice") {
        el.dataset.type = "multi-choice";
        const optionsHtml = buildOptionsHtml(block.options, "checkbox", "");
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-2 font-medium">${escapeHtml(block.question)}</p><div class="space-y-1 text-sm pl-4 options-container">${optionsHtml}<button onclick="addOption(this)" class="text-xs text-blue-600 hover:text-blue-800 mt-1">+ Thêm lựa chọn</button></div>${noteHtml}</div></div>`;
      } else if (block.type === "rating-grid") {
        el.dataset.type = "rating-grid";
        const timestamp = Date.now();
        const headerHtml = `<th contenteditable="true">${escapeHtml(block.criteriaLabel)}</th>` + block.cols.map((c) => `<th contenteditable="true" data-kind="${c.kind}">${escapeHtml(c.label)}</th>`).join("");
        const bodyHtml = (block.criteria.length ? block.criteria : ["Tiêu chí 1"]).map((crit, ri) => {
          const cells = block.cols.map((c) => `<td>${gridInputHtml(c.kind, `g${timestamp}_${ri}`)}</td>`).join("");
          return `<tr><td contenteditable="true">${escapeHtml(crit)}</td>${cells}</tr>`;
        }).join("");
        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-2 font-semibold">${escapeHtml(block.question)}</p><div class="rating-grid-controls mb-2 flex gap-2 flex-wrap text-xs"><button onclick="event.stopPropagation();addGridRow(this)" class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded hover:bg-blue-100">+ Hàng</button><button onclick="event.stopPropagation();removeGridRow(this)" class="px-2 py-0.5 bg-red-50 text-red-700 rounded hover:bg-red-100">- Hàng</button><button onclick="event.stopPropagation();addGridCol(this)" class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded hover:bg-blue-100">+ Cột</button><button onclick="event.stopPropagation();removeGridCol(this)" class="px-2 py-0.5 bg-red-50 text-red-700 rounded hover:bg-red-100">- Cột</button><select onchange="event.stopPropagation();changeGridType(this)" class="border border-gray-300 rounded px-1 py-0.5"><option value="yesno" ${block.gridType === "yesno" ? "selected" : ""}>Có/Không</option><option value="scale5" ${block.gridType === "scale5" ? "selected" : ""}>Thang 1-5</option><option value="scale10" ${block.gridType === "scale10" ? "selected" : ""}>Thang 1-10</option><option value="checklist" ${block.gridType === "checklist" ? "selected" : ""}>Danh sách tích chọn</option></select></div><table class="grid-table" data-grid-type="${block.gridType}"><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>${noteHtml}</div></div>`;
      } else if (block.type === "data-table") {
        el.dataset.type = "data-table";
        const cols = block.columns || [{name: 'Cột 1', type:'text'}];
        const dataRows = block.data || [[]];

        const tableHeaderHtml = cols.map(c => {
             let name = typeof c === 'string' ? c : c.name;
             let type = typeof c === 'string' ? 'text' : (c.type || 'text');
             let options = (c.options || []).join('|');
             return `<th class="border border-gray-300 p-1 bg-gray-50" contenteditable="true" data-col-type="${type}" data-col-options="${escapeHtml(options)}">${escapeHtml(name)}</th>`;
        }).join("");

        const rowsHtml = dataRows.map(row => {
             const cells = row.map((c, idx) => {
                 let colType = cols[idx] ? cols[idx].type : 'text';
                 if (colType === 'checkbox') {
                     let opts = cols[idx].options || [];
                     return `<td class="border border-gray-300 p-1.5 bg-gray-50 align-top" contenteditable="false">${window.buildMockCheckboxCell(opts)}</td>`;
                 } else if (colType === 'radio') {
                     let opts = cols[idx].options || [];
                     return `<td class="border border-gray-300 p-1.5 bg-gray-50 align-top" contenteditable="false">${window.buildMockRadioCell(opts, `radio_mock_${Date.now()}_${idx}`)}</td>`;
                 }
                 return `<td class="border border-gray-300 p-1" contenteditable="true">${escapeHtml(c)}</td>`;
             }).join("");
             return `<tr>${cells}</tr>`;
        }).join("");

        el.innerHTML = `<input type="checkbox" class="component-selector absolute top-2 right-2 z-10 w-4 h-4 cursor-pointer" onclick="event.stopPropagation()"><span class="component-badge">Nhập từ Word</span><div class="flex items-start gap-2"><div class="flex-1"><p contenteditable="true" class="text-sm mb-2 font-medium">${escapeHtml(block.question || "Bảng dữ liệu:")}</p><div style="overflow-x:auto;"><table class="w-full border-collapse border border-gray-300 text-xs"><tr>${tableHeaderHtml}</tr>${rowsHtml}</table></div><div class="mt-1 table-controls"><button onclick="addTableRow(this)" class="text-xs text-blue-600 hover:text-blue-800">+ Thêm hàng</button><button onclick="addTableCol(this)" class="text-xs text-blue-600 hover:text-blue-800 ml-2">+ Thêm cột</button></div>${noteHtml}</div></div>`;
      } else {
        el.dataset.type = "paragraph";
        el.innerHTML = `<div class="flex-1"><p contenteditable="true" class="text-sm">${escapeHtml(block.text || "")}</p>${noteHtml}</div>`;
      }
      content.appendChild(el);
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : String(str);
      return div.innerHTML;
    }

    // ============================================
    // "KHÁC" (OTHER) OPTION SUPPORT
    // ============================================
    function isOtherOptionLabel(text) {
      return /^kh[aá]c\b/i.test((text || "").trim());
    }

    function buildOptionRowHtml(optText, inputType, groupName) {
      const isOther = isOtherOptionLabel(optText);
      const otherInputHtml = isOther
        ? `<input type="text" class="survey-input other-input text-xs flex-1 ml-1" placeholder="Nhập nội dung khác..." onfocus="onOtherInputFocus(this)">`
        : "";
      return `<label class="flex items-center gap-2 option-item group"><input type="${inputType}" name="${groupName}"><span contenteditable="true" class="flex-1">${escapeHtml(optText)}</span>${otherInputHtml}<button onclick="removeOption(this)" class="text-red-400 hover:text-red-600 text-xs opacity-0 group-hover:opacity-100 transition">×</button></label>`;
    }

    function buildOptionsHtml(options, inputType, groupName) {
      return options.map((opt) => buildOptionRowHtml(opt, inputType, groupName)).join("");
    }

    function onOtherInputFocus(input) {
      const label = input.closest(".option-item");
      if (!label) return;
      const box = label.querySelector('input[type="radio"], input[type="checkbox"]');
      if (box && !box.checked) { box.checked = true; markDirty(); }
    }

    // ============================================
    // LƯỚI ĐÁNH GIÁ / BẢNG TÍCH CHỌN LINH HOẠT
    // ============================================
    window.gridInputHtml = function(kind, name) {
      if (kind === "text") return `<input type="text" class="survey-input text-xs w-full text-center" placeholder="Nhập...">`;
      if (kind === "checkbox") return `<input type="checkbox">`;
      return `<input type="radio" name="${name}">`;
    };

    window.gridThHtml = function(title, kind) {
      if (!kind) kind = "radio";
      return `<th data-kind="${kind}" class="border border-gray-300 p-1 relative group">
          <div class="flex items-center gap-1 justify-center">
              <span contenteditable="true" class="flex-1 outline-none min-w-[30px]">${title}</span>
              <select class="text-[10px] border border-gray-300 rounded p-0 outline-none text-gray-600 bg-white" onchange="event.stopPropagation();changeColType(this)">
                  <option value="radio" ${kind==='radio'?'selected':''}>1 Chọn</option>
                  <option value="checkbox" ${kind==='checkbox'?'selected':''}>N.Chọn</option>
                  <option value="text" ${kind==='text'?'selected':''}>V.Bản</option>
              </select>
          </div>
      </th>`;
    };

    window.changeColType = function(selectEl) {
      const th = selectEl.closest("th");
      const newKind = selectEl.value;
      th.dataset.kind = newKind;
      const tr = th.parentElement;
      const colIndex = Array.from(tr.children).indexOf(th);
      const table = th.closest("table");
      const tbody = table.querySelector("tbody");
      if (!tbody) return;
      const timestamp = Date.now();
      const rows = tbody.querySelectorAll("tr");
      rows.forEach((r, ri) => {
          const td = r.children[colIndex];
          if (td && colIndex > 0) {
              td.innerHTML = window.gridInputHtml(newKind, `gr_${timestamp}_${ri}`);
              td.removeAttribute("contenteditable");
              td.classList.add("text-center");
          }
      });
      markDirty();
    };

    // ============================================
    // SETTINGS FUNCTIONS
    // ============================================
    window.changePageSize = function(size) {
      const pages = document.querySelectorAll(".a4-page");
      pages.forEach((p) => { if (size === "A4") p.removeAttribute("data-size"); else p.dataset.size = "Letter"; });
      showToast("Đã đổi khổ giấy: " + size, "success");
      scheduleRepaginate();
    };

    window.changeBrandColor = function(color) {
      document.querySelectorAll(".doc-section.selected-component").forEach((el) => { el.style.outlineColor = color; });
      showToast("Đã đổi màu thương hiệu", "success");
    };

    window.changeGlobalFont = function(font) {
      document.querySelectorAll(".a4-page").forEach((p) => { p.style.fontFamily = font; });
      showToast("Đã đổi font: " + font, "success");
    };

    // ============================================
    // MARK DIRTY / AUTO-SAVE
    // ============================================
    function markDirty() {
      SurveyState.isDirty = true;
      const badge = document.getElementById("auto-save-indicator");
      badge.innerHTML = '<i data-lucide="clock" class="w-3 h-3"></i> Đang soạn...';
      badge.classList.remove("hidden");
      lucide.createIcons();
      clearTimeout(dirtyTimeout);
      dirtyTimeout = setTimeout(() => { SurveyState.save(); }, 30000);
      scheduleRepaginate();
    }

    // ============================================
    // LOADING OVERLAY
    // ============================================
    function showLoading(show) {
      const overlay = document.getElementById("loading-overlay");
      if (show) overlay.classList.remove("hidden");
      else overlay.classList.add("hidden");
    }

    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    function showToast(message, type = "success") {
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.animation = "fadeOut 0.3s ease forwards"; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    // ============================================
    // EVENT RE-ATTACHMENT
    // ============================================
    function reattachEvents() {
      document.querySelectorAll(".doc-section").forEach((el) => {
        el.onclick = function (e) { handleComponentClick(this, e); };
        el.ondblclick = function (e) {
          const editable = this.querySelector('[contenteditable="true"]');
          if (editable) { editable.focus(); const range = document.createRange(); range.selectNodeContents(editable); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
        };
        el.querySelectorAll(".option-item .text-red-400").forEach((btn) => { btn.onclick = function (e) { e.stopPropagation(); removeOption(this); }; });
        el.querySelectorAll('button[onclick*="addOption"]').forEach((btn) => { btn.onclick = function (e) { e.stopPropagation(); addOption(this); }; });
        el.querySelectorAll(".grid-controls button, .grid-controls select").forEach((btn) => {
          const onclick = btn.getAttribute("onclick");
          if (onclick) { btn.removeAttribute("onclick"); btn.addEventListener("click", function (e) { e.stopPropagation(); eval(onclick); }); }
        });
        el.querySelectorAll('button[onclick*="addTableRow"]').forEach((btn) => {
          const onclick = btn.getAttribute("onclick");
          if (onclick) { btn.removeAttribute("onclick"); btn.addEventListener("click", function (e) { e.stopPropagation(); addTableRow(this); }); }
        });
        el.querySelectorAll('button[onclick*="addTableCol"]').forEach((btn) => {
          const onclick = btn.getAttribute("onclick");
          if (onclick) { btn.removeAttribute("onclick"); btn.addEventListener("click", function (e) { e.stopPropagation(); addTableCol(this); }); }
        });
                el.querySelectorAll(".survey-input").forEach((input) => { input.onchange = function (e) { e.stopPropagation(); markDirty(); }; input.oninput = function (e) { e.stopPropagation(); markDirty(); }; });
        el.querySelectorAll('[contenteditable="true"]').forEach((editable) => {
          editable.oninput = function (e) { e.stopPropagation(); markDirty(); };
          editable.onblur = function (e) { if (selectedEl === el) window.updatePropsPanel(el); };
        });
        el.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach((input) => { input.onclick = function (e) { e.stopPropagation(); }; input.onchange = function (e) { e.stopPropagation(); markDirty(); }; });
        el.onkeydown = function (e) {
          if (e.ctrlKey && e.key === "s") { e.preventDefault(); saveSurvey(); }
          if (e.key === "Escape") { e.preventDefault(); if (selectedEl) { selectedEl.classList.remove("selected-component"); selectedEl = null; hideFloatingToolbar(); } }
        };
        el.oncontextmenu = function (e) { e.stopPropagation(); return true; };
      });
      document.addEventListener("paste", function (e) { if (e.target.closest && e.target.closest(".doc-section")) markDirty(); });
      document.addEventListener("cut", function (e) { if (e.target.closest && e.target.closest(".doc-section")) markDirty(); });
      lucide.createIcons();
    }

    // ============================================
    // DRAG & DROP
    // ============================================
    

    

    

    // ============================================
    // KEYBOARD SHORTCUTS
    // ============================================
        document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key === "s") { e.preventDefault(); saveSurvey(); }
      const activeTarget = e.target;
      const isEditingField = !!(activeTarget && (activeTarget.isContentEditable || activeTarget.tagName === "INPUT" || activeTarget.tagName === "TEXTAREA" || activeTarget.closest?.('[contenteditable="true"]')));
      
      if (e.key === "Enter" && !e.shiftKey && selectedEl && !isEditingField) {
        e.preventDefault();
        addComponent("paragraph");
        return;
      }
      
      if (e.key === "Delete" && selectedEl) {
        if (isEditingField) return;
        e.preventDefault();
        deleteComponent();
        return;
      }
      if (e.ctrlKey && e.key === "d") { e.preventDefault(); duplicateComponent(); }
      if (e.key === "Escape") { if (selectedEl) { selectedEl.classList.remove("selected-component"); selectedEl = null; hideFloatingToolbar(); } }
      if (e.ctrlKey && e.shiftKey && (e.key === "X" || e.key === "x")) { e.preventDefault(); deleteSelectedText(); }
    });

    // ============================================
    // DESELECT ON OUTSIDE CLICK
    // ============================================
    document.addEventListener("click", (e) => {
      const selection = window.getSelection();
      if (selection && !selection.isCollapsed) return;
      if (!e.target.closest(".doc-section") && !e.target.closest("#floating-toolbar") && !e.target.closest(".grid-controls") && !e.target.closest("#rte-toolbar") && !e.target.closest("#component-list") && !e.target.closest(".sidebar-left") && !e.target.closest(".sidebar-right")) {
        document.querySelectorAll(".doc-section.selected-component").forEach((el) => {
            el.classList.remove("selected-component");
            const cb = el.querySelector(".component-selector");
            if (cb) cb.checked = false;
        });
        selectedEl = null;
        lastSelectedEl = null;
        hideFloatingToolbar();
      }
    });

    // ============================================
    // INIT
    // ============================================
    document.addEventListener("DOMContentLoaded", init);
  </script>
</div>
