    // ============================================
    // EVENT RE-ATTACHMENT
    // ============================================
    function reattachEvents() {
        document.querySelectorAll('.doc-section').forEach(el => {
            el.onclick = function(e) {
                const selection = window.getSelection();
                if (selection && !selection.isCollapsed) {
                    return;
                }
                if (!e.target.closest('.drag-handle') && !e.target.closest('button')) {
                    selectComponent(this);
                }
            };

            el.ondblclick = function(e) {
                const editable = this.querySelector('[contenteditable="true"]');
                if (editable) {
                    editable.focus();
                    const range = document.createRange();
                    range.selectNodeContents(editable);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            };

            el.querySelectorAll('.option-item .text-red-400').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    removeOption(this);
                };
            });

            el.querySelectorAll('button[onclick*="addOption"]').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    addOption(this);
                };
            });

            el.querySelectorAll('.rating-grid-controls button, .rating-grid-controls select').forEach(btn => {
                const onclick = btn.getAttribute('onclick');
                if (onclick) {
                    btn.removeAttribute('onclick');
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        eval(onclick);
                    });
                }
            });

            el.querySelectorAll('button[onclick*="addTableRow"]').forEach(btn => {
                const onclick = btn.getAttribute('onclick');
                if (onclick) {
                    btn.removeAttribute('onclick');
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        addTableRow(this);
                    });
                }
            });

            el.querySelectorAll('button[onclick*="addTableCol"]').forEach(btn => {
                const onclick = btn.getAttribute('onclick');
                if (onclick) {
                    btn.removeAttribute('onclick');
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        addTableCol(this);
                    });
                }
            });

            const handle = el.querySelector('.drag-handle');
            if (handle) {
                handle.removeEventListener('mousedown', handle._dragListener);
                const dragListener = function(e) {
                    e.stopPropagation();
                    startDrag(e, el);
                };
                handle._dragListener = dragListener;
                handle.addEventListener('mousedown', dragListener);
            }

            el.querySelectorAll('.survey-input').forEach(input => {
                input.onchange = function(e) {
                    e.stopPropagation();
                    markDirty();
                };
                input.oninput = function(e) {
                    e.stopPropagation();
                    markDirty();
                };
            });

            el.querySelectorAll('[contenteditable="true"]').forEach(editable => {
                editable.oninput = function(e) {
                    e.stopPropagation();
                    markDirty();
                };
                editable.onblur = function(e) {
                    if (selectedEl === el) {
                        updatePropsPanel(el);
                    }
                };
            });

            el.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(input => {
                input.onclick = function(e) {
                    e.stopPropagation();
                };
                input.onchange = function(e) {
                    e.stopPropagation();
                    markDirty();
                };
            });

            el.onkeydown = function(e) {
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    saveSurvey();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    if (selectedEl) {
                        selectedEl.classList.remove('selected-component');
                        selectedEl = null;
                        hideFloatingToolbar();
                    }
                }
            };

            el.oncontextmenu = function(e) {
                e.stopPropagation();
                return true;
            };
        });

        document.addEventListener('paste', function(e) {
            if (e.target.closest && e.target.closest('.doc-section')) {
                markDirty();
            }
        });

        document.addEventListener('cut', function(e) {
            if (e.target.closest && e.target.closest('.doc-section')) {
                markDirty();
            }
        });

        lucide.createIcons();
    }

    // ============================================
    // DRAG & DROP
    // ============================================
    function startDrag(e, el) {
        dragData = {
            element: el,
            startY: e.clientY,
            placeholder: null
        };
        
        el.classList.add('dragging');
        
        const placeholder = document.createElement('div');
        placeholder.className = 'doc-section drag-over';
        placeholder.style.height = el.offsetHeight + 'px';
        placeholder.style.margin = '8px 6px';
        dragData.placeholder = placeholder;
        
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', endDrag);
        e.preventDefault();
    }

    function onDrag(e) {
        if (!dragData) return;
        
        const el = dragData.element;
        const container = el.parentNode;
        const rect = container.getBoundingClientRect();
        const mouseY = e.clientY - rect.top;
        
        const children = Array.from(container.children);
        let insertIndex = children.indexOf(el);
        
        for (let i = 0; i < children.length; i++) {
            if (i === insertIndex) continue;
            const childRect = children[i].getBoundingClientRect();
            if (mouseY > childRect.top - rect.top + childRect.height / 2) {
                insertIndex = i + 1;
            }
        }
        
        if (dragData.placeholder.parentNode) {
            dragData.placeholder.remove();
        }
        
        if (insertIndex > children.indexOf(el)) {
            container.insertBefore(dragData.placeholder, children[insertIndex] || null);
        } else {
            container.insertBefore(dragData.placeholder, children[insertIndex] || null);
        }
    }

    function endDrag(e) {
        if (!dragData) return;
        
        const el = dragData.element;
        const placeholder = dragData.placeholder;
        
        el.classList.remove('dragging');
        
        if (placeholder && placeholder.parentNode) {
            placeholder.parentNode.insertBefore(el, placeholder);
            placeholder.remove();
            selectComponent(el);
            markDirty();
        }
        
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', endDrag);
        dragData = null;
    }

    // ============================================
    // KEYBOARD SHORTCUTS
    // ============================================
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            saveSurvey();
        }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedEl && !window.getSelection().isCollapsed) {
            return;
        }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedEl) {
            e.preventDefault();
            deleteComponent();
        }
        if (e.ctrlKey && e.key === 'd') {
            e.preventDefault();
            duplicateComponent();
        }
        if (e.key === 'Escape') {
            if (selectedEl) {
                selectedEl.classList.remove('selected-component');
                selectedEl = null;
                hideFloatingToolbar();
            }
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'X' || e.key === 'x')) {
            e.preventDefault();
            deleteSelectedText();
        }
    });

    // ============================================
    // DESELECT ON OUTSIDE CLICK
    // ============================================
    document.addEventListener('click', (e) => {
        const selection = window.getSelection();
        if (selection && !selection.isCollapsed) {
            return;
        }
        
        if (!e.target.closest('.doc-section') && 
            !e.target.closest('#floating-toolbar') && 
            !e.target.closest('.rating-grid-controls') &&
            !e.target.closest('#rte-toolbar') &&
            !e.target.closest('#component-list') &&
            !e.target.closest('.sidebar-left') &&
            !e.target.closest('.sidebar-right')) {
            
            document.querySelectorAll('.doc-section.selected-component').forEach(el => {
                el.classList.remove('selected-component');
            });
            selectedEl = null;
            hideFloatingToolbar();
        }
    });

    // ============================================
    // INIT
    // ============================================
    document.addEventListener('DOMContentLoaded', init);
</script>
</div>
{% endblock %}
