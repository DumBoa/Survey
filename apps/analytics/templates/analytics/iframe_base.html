<!-- apps/analytics/templates/analytics/iframe_base.html -->
{% load static %}
<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Tổng quan khảo sát{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: transparent;
      }
      /* Ẩn header và sidebar do chúng không tồn tại trong iframe layout, 
         nhưng đảm bảo các div bọc chính (nếu trang con sử dụng lại css chung) hiển thị đúng */
      .app-body {
        display: block;
      }
      .main-content {
        padding: 0;
      }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-body">
        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <!-- Scripts chung -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
